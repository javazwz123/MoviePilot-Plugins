name: CI

on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Validate
        run: |
          python -m json.tool package.json >/dev/null
          python -m json.tool package.v2.json >/dev/null
          python -m compileall -q plugins.v2
          python -m unittest discover -s tests -v
          python scripts/check_plugin_versions.py package.json package.v2.json

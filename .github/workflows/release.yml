name: Plugin Release

on:
  push:
    branches: [main]
    paths: [package.json]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Validate
        run: |
          python -m compileall -q plugins
          python -m unittest discover -s tests -v
          python scripts/check_plugin_versions.py package.json

      - name: Package and publish
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          plugin_id="nodeseeksign"
          version="$(python -c 'import json; print(json.load(open("package.json"))["nodeseeksign"]["version"])')"
          tag="${plugin_id}_v${version}"
          asset="${plugin_id}_v${version}.zip"
          notes="$(python -c 'import json; d=json.load(open("package.json"))["nodeseeksign"]; print(d.get("history", {}).get("v" + d["version"], "Plugin release"))')"

          (cd plugins && zip -r "../${asset}" "${plugin_id}" -x '*/__pycache__/*' '*.pyc') >/dev/null

          if gh release view "${tag}" >/dev/null 2>&1; then
            gh release upload "${tag}" "${asset}" --clobber
            gh release edit "${tag}" --notes "${notes}" --latest
          else
            gh release create "${tag}" "${asset}" --title "${tag}" --notes "${notes}" --latest
          fi
